<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Booking & Contact</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="booking-container">
        <div class="booking-header">
            <h1>Book Your Appointment</h1>
            <p>Experience premium service with us</p>
        </div>
        
        <form action="https://formsubmit.co/vinaykhatrim@gmail.com" method="POST" id="booking-form">
            <input type="hidden" name="_next" value="vinaY60789.github.io/YOUR_REPO_NAME/">
            <input type="hidden" name="_captcha" value="false">

            <div class="form-group">
                <label for="name"><i class="fas fa-user"></i> Full Name</label>
                <input type="text" name="name" id="name" placeholder="Enter your name" required>
            </div>
            
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" name="email" id="email" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="date"><i class="fas fa-calendar-alt"></i> Select Date</label>
                <input type="date" name="date" id="date" required>
            </div>
            
            <div class="form-group">
                <label for="time"><i class="fas fa-clock"></i> Select Time</label>
                <input type="time" name="time" id="time" required>
            </div>
            
            <button type="submit" class="submit-btn">Confirm Booking</button>
        </form>

        <div class="or-divider">
            <span>OR</span>
        </div>

        <div class="contact-info">
            <div class="contact-item">
                <i class="fas fa-phone-alt"></i>
                <span>+91 7895252570</span> </div>
            <div class="contact-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>Premium Business Hub, Muzaffarnagar, India</span> </div>
        </div>

        <a href="https://wa.me/911234567890?text=Hello!%20I%20want%20to%20book%20an%20appointment." target="_blank" class="whatsapp-btn">
            <i class="fab fa-whatsapp"></i> Chat on WhatsApp
        </a>
    </div>
</body>
</html>
